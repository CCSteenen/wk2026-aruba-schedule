name: Generate WK 2026 Aruba Schedule

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run validate:data
      - run: npm run test
      - run: npm run render:all
      - uses: actions/upload-artifact@v4
        with:
          name: wk2026-aruba-schedule-outputs
          path: outputs/
